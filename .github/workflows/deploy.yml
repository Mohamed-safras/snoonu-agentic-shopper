name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  SERVICE: hala
  REPOSITORY: hala-images

# id-token: write is required for Workload Identity Federation — no
# service-account key is downloaded or stored anywhere (blocked by org policy).
permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v6

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push image
        id: build
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ steps.build.outputs.image }}
          # v3 changed the "wait" default to false — keep waiting so the job
          # only succeeds once the revision is actually serving.
          wait: true
          # Run as hala-runtime (granted Vertex AI + Secret Manager access in
          # setup) — without this, Cloud Run falls back to the default compute
          # service account, which has none of those permissions. Public chat
          # UI needs unauthenticated access, or every visitor gets a 403.
          flags: --service-account=hala-runtime@${{ env.PROJECT_ID }}.iam.gserviceaccount.com --allow-unauthenticated
          env_vars: |
            DEFAULT_LLM_PROVIDER=gemini
            GOOGLE_GENAI_USE_VERTEXAI=true
            GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }}
            GOOGLE_CLOUD_LOCATION=${{ env.REGION }}
            GEMINI_FAST_MODEL=gemini-2.5-flash
            GEMINI_PRO_MODEL=gemini-2.5-pro
            GEMINI_TRANSLATE_MODEL=gemini-2.5-flash
            GROQ_BASE_MODEL=llama-3.3-70b-versatile
            GROQ_FAST_MODEL=llama-3.1-8b-instant
            GROQ_VISION_MODEL=meta-llama/llama-4-scout-17b-16e-instruct
            SNOONU_MCP_URL=${{ vars.SNOONU_MCP_URL }}
          # Secrets live in Secret Manager, never in this repo or workflow logs.
          secrets: |
            GROQ_API_KEY=GROQ_API_KEY:latest
            GOOGLE_TRANSLATE_API_KEY=GOOGLE_TRANSLATE_API_KEY:latest
